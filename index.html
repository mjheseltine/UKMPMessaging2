<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MP Ideology Portal</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>MP Ideology Portal</h1>
      <p>Search MPs and view ideology scores by parliamentary session.</p>
    </header>

    <section class="search-card">
      <label for="searchInput">MP Name</label>
      <input id="searchInput" type="text" placeholder="Type a name, e.g. Rachel Reeves" />

      <div class="tabs" role="tablist" aria-label="Parliamentary session filters">
        <button class="tab active" data-session="All" type="button">All</button>
        <button class="tab" data-session="2017-2019" type="button">2017–2019</button>
        <button class="tab" data-session="2019-2024" type="button">2019–2024</button>
      </div>

      <div id="results" class="results"></div>
    </section>

    <section class="profile-card" id="profileCard">
      <h2 id="mpName">Select an MP</h2>
      <p id="mpMeta" class="muted">Results will appear here. </p>

      <div class="score-wrap">
        <div class="score-labels">
          <span>Left</span>
          <span>Right</span>
        </div>
        <div class="score-bar">
          <div class="score-midline"></div>
          <div class="score-dot" id="scoreDot"></div>
        </div>
        <div class="score-value" id="scoreValue"></div>
      </div>

      <div class="details">
        <div><strong>Party:</strong> <span id="partyValue">—</span></div>
        <div><strong>Constituency:</strong> <span id="constValue">—</span></div>
        <div><strong>Parliament:</strong> <span id="sessionValue">—</span></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="scripts/main.js"></script>
</body>
</html>
